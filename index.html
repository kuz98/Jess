<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dla Jess 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffd6eb,#ffc2e2);
    overflow: hidden;
}

/* KWIATKI W TLE */
.flower {
    position: absolute;
    width: 20px;
    height: 20px;
    background: pink;
    border-radius: 50%;
    opacity: 0.6;
    animation: float 6s infinite ease-in-out;
}

@keyframes float {
    0% {transform: translateY(0);}
    50% {transform: translateY(-20px);}
    100% {transform: translateY(0);}
}

/* EKRAN STARTOWY */
#start {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* PIXEL LUDZIK */
.pixel {
    width: 80px;
    height: 80px;
    image-rendering: pixelated;
    margin-bottom: 20px;
    animation: wave 1s infinite alternate;
}

@keyframes wave {
    from { transform: rotate(-10deg); }
    to { transform: rotate(10deg); }
}

h1 {
    color: #ff4f9a;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 15px;
    background: #ff82bc;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* GRA */
#game {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: 2px solid pink;
    width: 80px;
    text-align: center;
}
</style>
</head>

<body>

<!-- kwiatki -->
<div class="flower" style="top:10%;left:20%"></div>
<div class="flower" style="top:30%;left:70%"></div>
<div class="flower" style="top:60%;left:40%"></div>

<!-- START -->
<div id="start">
    <div class="pixel">🧍‍♀️</div>
    <h1>Cześć Jess 💖</h1>
    <button onclick="startGame()">Zaczynamy</button>
</div>

<!-- GRA -->
<div id="game">
    <h2>Jak się dziś czujesz (1-10)? 💖</h2>
    <input id="mood" type="number" min="1" max="10">
    <br><br>
    <button onclick="checkMood()">Wyślij</button>

    <p id="result"></p>
</div>

<script>

function startGame(){
    document.getElementById("start").style.display = "none";
    document.getElementById("game").style.display = "flex";
}

function checkMood(){
    let mood = parseInt(document.getElementById("mood").value);
    let result = document.getElementById("result");

    if(mood >= 9){
        result.innerHTML = "💖 Cieszę się, że tak się czujesz! Kocham Cię i chcę żebyś zawsze była szczęśliwa ❤️";
    }
    else if(mood >= 7){
        result.innerHTML = "💖 Super! Czy jest coś co może uczynić ten dzień jeszcze lepszym?";
    }
    else if(mood >= 1){
        result.innerHTML = "🌸 Jestem przy Tobie Jess. Wszystko będzie dobrze ❤️";
    }
    else{
        result.innerHTML = "Wpisz liczbę 1–10";
    }
}

</script>

</body>
</html>
