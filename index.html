<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jess 💖 v11</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffd6eb,#ffc2e2);
text-align:center;
overflow:hidden;
}

/* 💖 SERCA */
.heart{
position:absolute;
font-size:18px;
animation:float 6s linear forwards;
}
@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
10%{opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

/* START + APP */
#start,#app{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

/* 💖 PIXEL GIRL */
#girl{
width:120px;
height:140px;
margin-bottom:10px;
position:relative;
transition:0.3s;
animation:idle 2s infinite ease-in-out;
}

/* MACHANIE */
@keyframes idle{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-5px);}
}

.face{
width:60px;
height:60px;
background:#f5d7c6;
border-radius:50%;
margin:auto;
position:relative;
}

.eye{
width:8px;
height:8px;
background:#3aa0ff;
border-radius:50%;
position:absolute;
top:25px;
}

.eye.left{left:40px;}
.eye.right{right:40px;}

.mouth{
width:18px;
height:8px;
background:#b3005f;
border-radius:10px;
margin:8px auto;
}

/* EMOCJE */
.happy{filter:brightness(1.1) scale(1.15);}
.medium{filter:brightness(1) scale(1);}
.sad{filter:brightness(0.8) scale(0.95);}

/* UI */
button{
padding:10px;
border:none;
border-radius:10px;
background:#ff82bc;
color:white;
margin:5px;
cursor:pointer;
}

input,textarea{
padding:10px;
border-radius:10px;
border:2px solid pink;
}

#options,#chat{
margin-top:10px;
width:90%;
max-width:350px;
}

.girlWave{
animation:wave 0.6s infinite alternate;
}

@keyframes wave{
0%{transform:rotate(-3deg);}
100%{transform:rotate(3deg);}
}
</style>
</head>

<body>

<!-- 💖 SERCA -->
<script>
setInterval(()=>{
const h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(3+Math.random()*4)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),7000);
},400);
</script>

<!-- START -->
<div id="start">
<h1>Hej Jess 💖</h1>
<p>Jak się dziś czujesz (1–10)?</p>
<input id="mood" type="number" min="1" max="10">
<br><br>
<button onclick="start()">Dalej</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- PIXEL GIRL -->
<div id="girl">
<div class="face">
<div class="eye left"></div>
<div class="eye right"></div>
</div>
<div class="mouth"></div>
</div>

<div id="mainText"></div>

<div id="chat"></div>

<div id="options"></div>

</div>

<script>

let step=0;
let mood=0;

/* OPTIONS */
const optionsList=[
"Może zabiorę Cię na obiad?",
"Masaż?",
"Może obejrzymy film?",
"Może w coś zagramy?",
"Spacer?",
"Może posiedzimy i pogadamy?",
"yyyyy zakupy?",
"yyyyy sprzątamy?"
];

/* START */
function start(){
mood=parseInt(document.getElementById("mood").value);

document.getElementById("start").style.display="none";
document.getElementById("app").style.display="flex";

step=0;
document.getElementById("chat").innerHTML="";
document.getElementById("options").innerHTML="";

setEmotion(mood);

/* 8–10 */
if(mood>=8){
show("💖 Super Jess! Dziś jest pięknie 💖");
clearAll();
}

/* 4–7 CHAT */
else if(mood>=4){
show("💬 Jestem przy Tobie Jess. Porozmawiajmy.");
showChat();
}

/* 1–3 OPTIONS */
else{
show("💔 Bardzo mi przykro... jestem tu dla Ciebie");
showNextOption();
}
}

/* EMOTION */
function setEmotion(m){
let g=document.getElementById("girl");

g.classList.remove("happy","medium","sad");

if(m>=8) g.classList.add("happy");
else if(m>=4) g.classList.add("medium");
else g.classList.add("sad");

/* wave animation */
if(m>=8){
g.classList.add("girlWave");
}else{
g.classList.remove("girlWave");
}
}

function show(t){
document.getElementById("mainText").innerHTML=t;
}

function clearAll(){
document.getElementById("options").innerHTML="";
document.getElementById("chat").innerHTML="";
}

/* 💬 CHAT (4–7) */
function showChat(){
document.getElementById("chat").innerHTML=`
<textarea id="txt" placeholder="Napisz co czujesz..."></textarea><br>
<button onclick="reply()">Wyślij</button>
`;
}

function reply(){
let t=document.getElementById("txt").value;

document.getElementById("chat").innerHTML=
"<b>Jess:</b> "+t+"<br><br>"+
"<b>💖 Ja:</b> Rozumiem Cię Jess. Jestem tu z Tobą i to ma sens.";

document.getElementById("options").innerHTML=`
<button onclick="support()">Wsparcie</button>
<button onclick="action()">Zróbmy coś</button>
`;
}

function support(){
show("💖 Jestem przy Tobie Jess.");
document.getElementById("options").innerHTML="";
}

function action(){
step=0;
showNextOption();
}

/* 💔 1–3 FLOW */
function showNextOption(){

if(step>=optionsList.length){
show("💖 Powiedz mi na co masz ochotę Jess");
document.getElementById("options").innerHTML=`
<textarea id="custom"></textarea><br>
<button onclick="custom()">Wyślij</button>
`;
return;
}

document.getElementById("options").innerHTML=`
<p>${optionsList[step]}</p>
<button onclick="yes()">Tak</button>
<button onclick="no()">Nie</button>
`;
}

function yes(){
show("💖 Ok to działamy!");
document.getElementById("options").innerHTML="";
}

function no(){
step++;
showNextOption();
}

function custom(){
let t=document.getElementById("custom").value;
show("💖 Ok to działamy! 💖");
document.getElementById("options").innerHTML="";
}

</script>

</body>
</html>
