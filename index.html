<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dla Jess 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffd6eb,#ffc2e2);
    overflow: hidden;
}

/* 🌸 kwiatki */
.flower {
    position: absolute;
    width: 14px;
    height: 14px;
    background: #ff9ecf;
    border-radius: 50%;
    opacity: 0.6;
    animation: float 6s infinite ease-in-out;
}

@keyframes float {
    0% {transform: translateY(0);}
    50% {transform: translateY(-25px);}
    100% {transform: translateY(0);}
}

/* START SCREEN */
#start {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* 🧍 PIXEL GIRL */
.pixelGirl {
    width: 120px;
    height: 120px;
    background:
        linear-gradient(#000,#000) 20px 10px / 80px 20px no-repeat,
        linear-gradient(#000,#000) 10px 20px / 100px 30px no-repeat,
        radial-gradient(circle,#f5d7c6 60%,transparent 61%) 35px 35px / 50px 50px no-repeat,
        linear-gradient(#111,#111) 30px 70px / 60px 25px no-repeat,
        linear-gradient(#2b2b2b,#2b2b2b) 35px 95px / 50px 25px no-repeat;

    border-radius: 10px;
    position: relative;
    animation: wave 1s infinite alternate;
}

@keyframes wave {
    from { transform: rotate(-5deg) translateY(0); }
    to { transform: rotate(5deg) translateY(-3px); }
}

.pixelGirl::after {
    content: "👋";
    position: absolute;
    right: -20px;
    top: 40px;
    animation: hand 0.6s infinite alternate;
}

@keyframes hand {
    from { transform: rotate(-20deg); }
    to { transform: rotate(20deg); }
}

h1 {
    color: #ff4f9a;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 15px;
    background: #ff82bc;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* GAME */
#game {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: 2px solid pink;
    width: 80px;
    text-align: center;
}

#result {
    margin-top: 20px;
    font-size: 18px;
    color: #b3005f;
}
</style>
</head>

<body>

<!-- 🌸 kwiatki -->
<div class="flower" style="top:10%;left:15%"></div>
<div class="flower" style="top:25%;left:70%"></div>
<div class="flower" style="top:60%;left:30%"></div>
<div class="flower" style="top:80%;left:80%"></div>

<!-- START -->
<div id="start">
    <div class="pixelGirl"></div>
    <h1>Cześć Jess 💖</h1>
    <p>Twoja rockowa pixelowa ja Cię wita 👋</p>
    <button onclick="startGame()">Zaczynamy</button>
</div>

<!-- GAME -->
<div id="game">
    <h2>Jak się dziś czujesz (1-10)? 💖</h2>
    <input id="mood" type="number" min="1" max="10">
    <br><br>
    <button onclick="checkMood()">Wyślij</button>

    <p id="result"></p>
</div>

<script>

function startGame(){
    document.getElementById("start").style.display = "none";
    document.getElementById("game").style.display = "flex";
}

function checkMood(){
    let mood = parseInt(document.getElementById("mood").value);
    let result = document.getElementById("result");

    if(mood >= 9){
        result.innerHTML = "💖 Cieszę się Jess! Jesteś super ważna i chcę żebyś zawsze czuła się dobrze ❤️";
    }
    else if(mood >= 7){
        result.innerHTML = "💖 Fajnie! Co mogłoby dziś zrobić Twój dzień jeszcze lepszym?";
    }
    else if(mood >= 1){
        result.innerHTML = "🌸 Jestem przy Tobie Jess. Nie jesteś sama ❤️";
    }
    else{
        result.innerHTML = "Wpisz liczbę 1–10";
    }
}

</script>

</body>
</html>
