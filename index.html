<h1 style="color:red;font-size:40px">
TEST CZY TO SIĘ AKTUALIZUJE
</h1>
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jess 💖 Stable Core</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffd6eb,#ffc2e2);
text-align:center;
}

/* START + APP */
#start,#app{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

/* 💖 PIXEL GIRL (STAŁA!) */
#girl{
width:120px;
height:140px;
margin-bottom:10px;
position:relative;
}

.face{
width:60px;
height:60px;
background:#f5d7c6;
border-radius:50%;
margin:auto;
position:relative;
}

.eye{
width:8px;
height:8px;
background:#3aa0ff;
border-radius:50%;
position:absolute;
top:25px;
}

.eye.left{left:40px;}
.eye.right{right:40px;}

.mouth{
width:18px;
height:8px;
background:#b3005f;
border-radius:10px;
margin:8px auto;
}

/* EMOCJE */
.happy{transform:scale(1.15);}
.medium{transform:scale(1);}
.sad{transform:scale(0.9);filter:brightness(0.7);}

/* UI */
button{
padding:10px;
border:none;
border-radius:10px;
background:#ff82bc;
color:white;
margin:5px;
cursor:pointer;
}

input,textarea{
padding:10px;
border-radius:10px;
border:2px solid pink;
}

/* BOXY */
#chat,#options{
margin-top:10px;
width:90%;
max-width:350px;
}
</style>
</head>

<body>

<!-- START -->
<div id="start">
<h1>Hej Jess 💖</h1>
<p>Jak się dziś czujesz (1–10)?</p>
<input id="mood" type="number" min="1" max="10">
<br><br>
<button onclick="start()">Dalej</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- 💖 GIRL ZAWSZE TU JEST -->
<div id="girl">
<div class="face">
<div class="eye left"></div>
<div class="eye right"></div>
</div>
<div class="mouth"></div>
</div>

<div id="mainText"></div>

<div id="chat"></div>

<div id="options"></div>

</div>

<script>

let step=0;
let mood=0;

/* START */
function start(){
mood=parseInt(document.getElementById("mood").value);

document.getElementById("start").style.display="none";
document.getElementById("app").style.display="flex";

step=0;
document.getElementById("chat").innerHTML="";
document.getElementById("options").innerHTML="";

setEmotion(mood);

/* FLOW */
if(mood>=8){
show("💖 Super Jess! Dziś jest piękny dzień");
clearOptions();
}

else if(mood>=4){
show("💬 Jestem przy Tobie Jess. Pogadajmy.");
mediumStart();
}

else{
show("💔 Jest mi przykro... jestem tu dla Ciebie");
showSupport();
}
}

/* EMOTION (PIXEL GIRL REACTS) */
function setEmotion(m){
let g=document.getElementById("girl");

g.classList.remove("happy","medium","sad");

if(m>=8) g.classList.add("happy");
else if(m>=4) g.classList.add("medium");
else g.classList.add("sad");
}

/* TEXT */
function show(t){
document.getElementById("mainText").innerHTML=t;
}

/* CLEAR */
function clearOptions(){
document.getElementById("options").innerHTML="";
}

/* 💬 MEDIUM (4–7) */
function mediumStart(){
document.getElementById("options").innerHTML=`
<textarea id="txt"></textarea><br>
<button onclick="mediumReply()">Wyślij</button>
`;
}

function mediumReply(){
let t=document.getElementById("txt").value;

document.getElementById("chat").innerHTML=
"<b>Jess:</b> "+t+"<br><br>"+
"<b>💖 Ja:</b> Rozumiem Cię Jess. Jestem przy Tobie.";

mediumNext();
}

function mediumNext(){
document.getElementById("options").innerHTML=`
<p>Co teraz wolisz?</p>
<button onclick="support()">Wsparcie</button>
<button onclick="action()">Coś zrobić</button>
`;
}

function support(){
document.getElementById("chat").innerHTML+=
"<br>💖 Jestem tutaj z Tobą Jess.";
clearOptions();
}

function action(){
showSupport();
}

/* 💔 1–3 OPTIONS */
function showSupport(){
document.getElementById("options").innerHTML=`
<p>Może coś z tego pomoże?</p>
<button onclick="pick('Obiad')">Obiad</button>
<button onclick="pick('Masaż')">Masaż</button>
<button onclick="pick('Film')">Film</button>
<button onclick="pick('Gra')">Gra</button>
<button onclick="pick('Spacer')">Spacer</button>
<button onclick="pick('Rozmowa')">Rozmowa</button>
<button onclick="pick('Zakupy')">Zakupy</button>
<button onclick="pick('Sprzątanie')">Sprzątanie</button>
`;
}

function pick(x){
document.getElementById("chat").innerHTML+=
"<br>💖 Robimy: "+x;
clearOptions();
}

</script>

</body>
</html>
