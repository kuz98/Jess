<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jess 💖 Fix</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffd6eb,#ffc2e2);
overflow-x:hidden;
text-align:center;
}

/* 💖 SERCA */
.heart{
position:absolute;
font-size:18px;
animation:floatUp 6s linear forwards;
}
@keyframes floatUp{
0%{transform:translateY(100vh);opacity:0;}
10%{opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

/* START */
#start,#app{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

/* GIRL */
.girl{
width:120px;
height:140px;
position:relative;
margin-bottom:10px;
transition:0.3s;
}

.face{
width:60px;height:60px;
background:#f5d7c6;
border-radius:50%;
margin:auto;
position:relative;
}

.eye{
width:8px;height:8px;
background:#3aa0ff;
border-radius:50%;
position:absolute;
top:25px;
}

.eye.left{left:40px;}
.eye.right{right:40px;}

.mouth{
width:20px;height:8px;
background:#b3005f;
border-radius:10px;
margin:8px auto;
transition:0.3s;
}

/* EMOCJE */
.happy{transform:scale(1.1);}
.medium{transform:scale(1);}
.sad{transform:scale(0.95);filter:brightness(0.7);}

button{
padding:10px;
border:none;
border-radius:10px;
background:#ff82bc;
color:white;
margin:5px;
cursor:pointer;
}

input,textarea{
padding:10px;
border-radius:10px;
border:2px solid pink;
}

/* CHAT */
#chat{
width:90%;
max-width:350px;
height:150px;
overflow:auto;
background:rgba(255,255,255,0.4);
margin:10px auto;
border-radius:10px;
padding:10px;
}
</style>
</head>

<body>

<!-- 💖 SERCA -->
<script>
setInterval(()=>{
const h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(3+Math.random()*4)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),7000);
},400);
</script>

<!-- START -->
<div id="start">
<h1>Hej Jess 💖</h1>
<p>Jak się dziś czujesz (1–10)?</p>
<input id="mood" type="number" min="1" max="10">
<br><br>
<button onclick="start()">Dalej</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div id="girl" class="girl">
<div class="face">
<div class="eye left"></div>
<div class="eye right"></div>
</div>
<div class="mouth"></div>
</div>

<div id="mainText"></div>

<div id="chat"></div>
<div id="options"></div>

</div>

<script>

let step=0;

function start(){
let mood=parseInt(document.getElementById("mood").value);

document.getElementById("start").style.display="none";
document.getElementById("app").style.display="flex";

/* RESET */
step=0;
document.getElementById("chat").innerHTML="";
document.getElementById("options").innerHTML="";

/* EMOTION + FLOW */
if(mood>=8){
setGirl("happy");
show("💖 Super Jess! Cieszę się że jest dobrze!");
}

else if(mood>=4){
setGirl("medium");
show("💬 Jest średnio... chcę z Tobą porozmawiać.");
startChat();
}

else{
setGirl("sad");
show("💔 Bardzo mi przykro skarbie...");
showYesNo();
}
}

/* GIRL EMOTION */
function setGirl(type){
let g=document.getElementById("girl");
g.classList.remove("happy","medium","sad");
g.classList.add(type);
}

/* TEXT */
function show(t){
document.getElementById("mainText").innerHTML=t;
}

/* CHAT MODE */
function startChat(){
document.getElementById("options").innerHTML=`
<p>Co się dzieje Jess?</p>
<textarea id="txt"></textarea><br>
<button onclick="reply()">Wyślij</button>
`;
}

function reply(){
let t=document.getElementById("txt").value;

document.getElementById("chat").innerHTML+=
"<div>Jess: "+t+"</div>";

document.getElementById("chat").innerHTML+=
"<div>💖 Rozumiem... co mogę dla Ciebie zrobić?</div>";

showYesNo();
}

/* YES NO */
function showYesNo(){
document.getElementById("options").innerHTML=`
<button onclick="yes()">Tak</button>
<button onclick="no()">Nie</button>
`;
}

function yes(){
show("💖 Dobrze Jess, działamy!");
document.getElementById("options").innerHTML="";
}

function no(){

let options=[
"Może zabiorę Cię na obiad?",
"Może masaż?",
"Może film?",
"Może gra?",
"Spacer?",
"Rozmowa?",
"Zakupy?",
"Sprzątanie?"
];

if(step<options.length){
showOption(options[step]);
step++;
}
else{
show("💖 Powiedz mi co chcesz robić Jess");
document.getElementById("options").innerHTML=`
<textarea id="custom"></textarea><br>
<button onclick="custom()">Wyślij</button>
`;
}
}

function showOption(text){
document.getElementById("options").innerHTML=`
<p>${text}</p>
<button onclick="yes()">Tak</button>
<button onclick="no()">Nie</button>
`;
}

function custom(){
let t=document.getElementById("custom").value;
show("💖 Rozumiem: "+t);
document.getElementById("options").innerHTML="";
}

</script>

</body>
</html>
