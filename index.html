<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jess 💖</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffd6eb,#ffc2e2);
text-align:center;
}

#start,#app{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

/* GIRL */
.girl{
width:120px;
height:140px;
position:relative;
margin-bottom:10px;
}

.face{
width:60px;height:60px;
background:#f5d7c6;
border-radius:50%;
margin:auto;
position:relative;
}

.eye{
width:8px;height:8px;
background:#3aa0ff;
border-radius:50%;
position:absolute;
top:25px;
}

.eye.left{left:40px;}
.eye.right{right:40px;}

.mouth{
width:18px;height:8px;
background:#b3005f;
border-radius:10px;
margin:8px auto;
}

.happy{transform:scale(1.1);}
.medium{transform:scale(1);}
.sad{transform:scale(0.95);filter:brightness(0.7);}

button{
padding:10px;
border:none;
border-radius:10px;
background:#ff82bc;
color:white;
margin:5px;
cursor:pointer;
}

textarea,input{
padding:10px;
border-radius:10px;
border:2px solid pink;
}

#chat{
margin-top:10px;
width:90%;
max-width:350px;
background:rgba(255,255,255,0.4);
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<!-- START -->
<div id="start">
<h1>Hej Jess 💖</h1>
<p>Jak się dziś czujesz (1–10)?</p>
<input id="mood" type="number" min="1" max="10">
<br><br>
<button onclick="start()">Dalej</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div id="girl" class="girl">
<div class="face">
<div class="eye left"></div>
<div class="eye right"></div>
</div>
<div class="mouth"></div>
</div>

<div id="mainText"></div>

<div id="chat"></div>

<div id="options"></div>

</div>

<script>

let step=0;

function start(){
let mood=parseInt(document.getElementById("mood").value);

document.getElementById("start").style.display="none";
document.getElementById("app").style.display="flex";

step=0;
document.getElementById("chat").innerHTML="";
document.getElementById("options").innerHTML="";

setEmotion(mood);

/* 8–10 */
if(mood>=8){
show("💖 Super Jess! Cieszę się że czujesz się dobrze 💖");
}

/* 4–7 = MEDIUM CHAT */
else if(mood>=4){
show("💬 Widzę że jest Ci trochę ciężej... jestem tu z Tobą.");

mediumChat();
}

/* 1–3 */
else{
show("💔 Bardzo mi przykro skarbie...");
showOptions();
}
}

/* EMOTION */
function setEmotion(m){
let g=document.getElementById("girl");
g.classList.remove("happy","medium","sad");

if(m>=8) g.classList.add("happy");
else if(m>=4) g.classList.add("medium");
else g.classList.add("sad");
}

/* TEXT */
function show(t){
document.getElementById("mainText").innerHTML=t;
}

/* 💬 MEDIUM CHAT (symulacja AI rozmowy) */
function mediumChat(){
document.getElementById("options").innerHTML=`
<textarea id="txt" placeholder="Napisz co czujesz..."></textarea><br>
<button onclick="replyMedium()">Wyślij</button>
`;
}

function replyMedium(){
let t=document.getElementById("txt").value;

document.getElementById("chat").innerHTML=
"<b>Jess:</b> "+t+"<br><br>"+
"<b>💖 Ja:</b> Rozumiem Cię Jess. To co czujesz ma sens. Chcesz, żebym pomogła Ci coś z tym zrobić czy wolisz po prostu chwilę wsparcia?";
}

/* 1–3 OPTIONS */
function showOptions(){
document.getElementById("options").innerHTML=`
<p>Czy mogę Ci jakoś pomóc?</p>
<button onclick="yes()">Tak</button>
<button onclick="no()">Nie</button>
`;
}

function yes(){
document.getElementById("chat").innerHTML="💖 Super, jestem z Tobą Jess.";
document.getElementById("options").innerHTML="";
}

function no(){

let options=[
"Może zabiorę Cię na obiad?",
"Masaż?",
"Film?",
"Gra?",
"Spacer?",
"Rozmowa?",
"Zakupy?",
"Sprzątanie?"
];

document.getElementById("options").innerHTML=`
<p>${options[step]}</p>
<button onclick="nextYes()">Tak</button>
<button onclick="nextNo()">Nie</button>
`;

step++;
}

function nextYes(){
document.getElementById("chat").innerHTML="💖 Robimy to!";
document.getElementById("options").innerHTML="";
}

function nextNo(){
no();
}

</script>

</body>
</html>
