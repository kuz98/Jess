<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dla Jess 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffd6eb,#ffc2e2);
    overflow: hidden;
}

/* 💖 SERDUSZKA W TLE */
.heart {
    position: absolute;
    bottom: -50px;
    font-size: 20px;
    animation: floatUp linear forwards;
    pointer-events: none;
}

@keyframes floatUp {
    0% {
        transform: translateY(0);
        opacity: 0;
    }
    10% {
        opacity: 1;
    }
    100% {
        transform: translateY(-120vh);
        opacity: 0;
    }
}

/* START */
#start {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* PIXEL GIRL */
.pixelGirl {
    width: 160px;
    height: 200px;
    position: relative;
    animation: bounce 1.2s infinite alternate;
}

.hair {
    position: absolute;
    width: 110px;
    height: 80px;
    background: #000;
    border-radius: 50px 50px 20px 20px;
    top: 0;
    left: 25px;
}

.face {
    position: absolute;
    width: 70px;
    height: 70px;
    background: #f5d7c6;
    border-radius: 50%;
    top: 10px;
    left: 45px;
}

.eye {
    position: absolute;
    width: 10px;
    height: 10px;
    background: #3aa0ff;
    border-radius: 50%;
    top: 35px;
}

.eye.left { left: 60px; }
.eye.right { left: 90px; }

.body {
    position: absolute;
    width: 90px;
    height: 80px;
    background: #111;
    top: 90px;
    left: 35px;
    border-radius: 10px;
}

.legs {
    position: absolute;
    width: 90px;
    height: 50px;
    background: #2b2b2b;
    top: 165px;
    left: 35px;
}

.arm {
    position: absolute;
    width: 18px;
    height: 60px;
    background: #f5d7c6;
    top: 95px;
    right: 0;
    transform-origin: top;
    animation: wave 0.5s infinite alternate;
}

@keyframes wave {
    from { transform: rotate(-25deg); }
    to { transform: rotate(45deg); }
}

@keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-5px); }
}

h1 {
    color: #ff4f9a;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 15px;
    background: #ff82bc;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* GAME */
#game {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: 2px solid pink;
    width: 80px;
    text-align: center;
}

#result {
    margin-top: 20px;
    font-size: 18px;
    color: #b3005f;
}
</style>
</head>

<body>

<!-- 💖 SERDUSZKA JS -->
<script>
function createHeart(){
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random() * 4) + "s";
    heart.style.fontSize = (14 + Math.random() * 20) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 7000);
}

setInterval(createHeart, 300);
</script>

<!-- START -->
<div id="start">
    <div class="pixelGirl">
        <div class="hair"></div>
        <div class="face"></div>
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="body"></div>
        <div class="legs"></div>
        <div class="arm"></div>
    </div>

    <h1>Hej Jess 💖</h1>
    <p>Jak się dziś czujesz?</p>

    <button onclick="startGame()">Zaczynamy</button>
</div>

<!-- GAME -->
<div id="game">
    <h2>Jak się dziś czujesz (1-10)? 💖</h2>
    <input id="mood" type="number" min="1" max="10">
    <br><br>
    <button onclick="checkMood()">Wyślij</button>

    <p id="result"></p>
</div>

<script>

function startGame(){
    document.getElementById("start").style.display = "none";
    document.getElementById("game").style.display = "flex";
}

function checkMood(){
    let mood = parseInt(document.getElementById("mood").value);
    let result = document.getElementById("result");

    if(mood >= 9){
        result.innerHTML = "💖 Cieszę się Jess! Jesteś ważna i zasługujesz na dobro ❤️";
    }
    else if(mood >= 7){
        result.innerHTML = "💖 Super! Co mogłoby dziś poprawić Twój dzień?";
    }
    else if(mood >= 1){
        result.innerHTML = "🌸 Jestem przy Tobie Jess. Nie jesteś sama ❤️";
    }
    else{
        result.innerHTML = "Wpisz liczbę 1–10";
    }
}

</script>

</body>
</html>
