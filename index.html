<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jess 💖 v10</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffd6eb,#ffc2e2);
text-align:center;
}

#start,#app{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

/* 💖 PIXEL GIRL */
#girl{
width:120px;
height:140px;
margin-bottom:10px;
position:relative;
transition:0.3s;
}

.face{
width:60px;
height:60px;
background:#f5d7c6;
border-radius:50%;
margin:auto;
position:relative;
}

.eye{
width:8px;
height:8px;
background:#3aa0ff;
border-radius:50%;
position:absolute;
top:25px;
}

.eye.left{left:40px;}
.eye.right{right:40px;}

.mouth{
width:18px;
height:8px;
background:#b3005f;
border-radius:10px;
margin:8px auto;
}

.happy{transform:scale(1.15);}
.medium{transform:scale(1);}
.sad{transform:scale(0.9);filter:brightness(0.7);}

button{
padding:10px;
border:none;
border-radius:10px;
background:#ff82bc;
color:white;
margin:5px;
cursor:pointer;
}

input,textarea{
padding:10px;
border-radius:10px;
border:2px solid pink;
}

#options{
margin-top:10px;
width:90%;
max-width:350px;
}
</style>
</head>

<body>

<div id="start">
<h1>Hej Jess 💖</h1>
<p>Jak się dziś czujesz (1–10)?</p>
<input id="mood" type="number" min="1" max="10">
<br><br>
<button onclick="start()">Dalej</button>
</div>

<div id="app" style="display:none;">

<div id="girl">
<div class="face">
<div class="eye left"></div>
<div class="eye right"></div>
</div>
<div class="mouth"></div>
</div>

<div id="mainText"></div>

<div id="options"></div>

</div>

<script>

let step = 0;

/* 💖 dokładnie Twój styl */
const optionsList = [
"Może zabiorę Cię na obiad?",
"Masaż?",
"Może obejrzymy jakiś film?",
"Może w coś zagramy?",
"Spacer?",
"Może posiedzimy i pogadamy?",
"yyyyy zakupy?",
"yyyyy sprzątamy?"
];

function start(){
let mood = parseInt(document.getElementById("mood").value);

document.getElementById("start").style.display="none";
document.getElementById("app").style.display="flex";

step = 0;

setEmotion(mood);

if(mood>=8){
show("💖 Super Jess! Dziś jest piękny dzień");
clearOptions();
}

else if(mood>=4){
show("💬 Jestem tu z Tobą Jess.");
clearOptions();
}

else{
show("💔 Bardzo mi przykro... jestem tu dla Ciebie");
showNextOption();
}
}

/* 💖 pixel girl reakcje */
function setEmotion(m){
let g=document.getElementById("girl");

g.classList.remove("happy","medium","sad");

if(m>=8) g.classList.add("happy");
else if(m>=4) g.classList.add("medium");
else g.classList.add("sad");
}

function show(t){
document.getElementById("mainText").innerHTML=t;
}

function clearOptions(){
document.getElementById("options").innerHTML="";
}

/* 🔁 SEKWENCJA */
function showNextOption(){

if(step >= optionsList.length){
show("💖 Powiedz mi co chcesz zrobić Jess");
document.getElementById("options").innerHTML=`
<textarea id="custom"></textarea><br>
<button onclick="custom()">Wyślij</button>
`;
return;
}

document.getElementById("options").innerHTML=`
<p>${optionsList[step]}</p>
<button onclick="yes()">Tak</button>
<button onclick="no()">Nie</button>
`;
}

function yes(){
show("💖 Super to chodź do mnie i działajmy !");
clearOptions();
}

function no(){
step++;
showNextOption();
}

function custom(){
let t=document.getElementById("custom").value;
show("💖 Rozumiem: "+t);
clearOptions();
}

</script>

</body>
</html>
